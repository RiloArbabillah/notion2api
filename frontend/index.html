    ],
    afternoon:[ // 14:00-17:59
      "Good afternoon.",
      "Afternoon deep work.",
      "The productive hours.",
      "Afternoon momentum.",
      "Still plenty of daylight left.",
      "Afternoon focus. What's the task?",
      "Let's finish strong today.",
      "The afternoon push. Ready.",
      "Golden hours for getting things done.",
      "Steady afternoon. What do you need?",
    ],
    evening:[ // 18:00-20:59
      "Good evening.",
      "Evening mode. Winding down or ramping up?",
      "The evening shift.",
      "Quiet evening. Good for thinking.",
      "Evening hours. What's on your mind?",
      "Settling in for the evening.",
      "Evening calm. Let's work through something.",
      "The day slows down. Ideas don't.",
      "Evening focus.",
      "A good evening to figure things out.",
    ],
    night:[ // 21:00-22:59
      "Night owl mode.",
      "Late evening. Still going?",
      "The night is young.",
      "Night session. Let's be productive.",
      "Quiet night. Deep thoughts.",
      "Burning the midnight oil, almost.",
      "Night thinking hits different.",
      "The world sleeps. We work.",
    ],
    lateNight:[ // 23:00-4:59
      "Late night session.",
      "The witching hour. What are we solving?",
      "Can't sleep? Let's build something.",
      "Late night, clear mind.",
      "The quiet hours. Best for deep work.",
      "Night shift. I'm here.",
      "3 AM energy. Let's use it.",
      "The world is asleep. We're not.",
      "Late night debugging?",
      "Midnight oil. What's the plan?",
    ]
  };
  let pool;
  if(h>=5&&h<8)pool=pools.earlyMorning;
  else if(h>=8&&h<12)pool=pools.morning;
  else if(h>=12&&h<14)pool=pools.midday;
  else if(h>=14&&h<18)pool=pools.afternoon;
  else if(h>=18&&h<21)pool=pools.evening;
  else if(h>=21&&h<23)pool=pools.night;
  else pool=pools.lateNight;
  // Pick a random greeting, avoid repeating the last one shown
  const lastGreeting=sessionStorage.getItem('_lastGreeting')||'';
  let pick=pool[Math.floor(Math.random()*pool.length)];
  if(pool.length>1){let tries=0;while(pick===lastGreeting&&tries<5){pick=pool[Math.floor(Math.random()*pool.length)];tries++}}
  sessionStorage.setItem('_lastGreeting',pick);
  el.textContent=pick;
}

/* ===== WELCOME SUGGESTIONS ===== */
const SUGGESTION_POOLS={
  general:[
    "Explain a complex concept in simple terms",
    "Help me brainstorm ideas for a project",
    "Compare two technologies and their tradeoffs",
    "Summarize a long document or article",
    "Help me write a professional email",
    "Create a study plan for learning something new",
    "Help me think through a difficult decision",
    "Generate a list of creative solutions to a problem",
  ],
  coding:[
    "Review my code and suggest improvements",
    "Help me debug an error I'm stuck on",
    "Explain a design pattern with examples",
    "Write unit tests for a function",
    "Refactor this code to be more readable",
    "Help me design a database schema",
    "Explain the difference between two approaches",
    "Write a script to automate a repetitive task",
    "Help me optimize this slow query",
    "Walk me through setting up a new project",
  ],
  writing:[
    "Help me outline a blog post",
    "Proofread and improve my writing",
    "Write a clear technical document",
    "Draft a project proposal",
    "Help me write a README for my project",
    "Summarize meeting notes into action items",
    "Turn rough notes into polished prose",
    "Help me write a compelling introduction",
  ],
  thinking:[
    "Help me break down a large problem",
    "Play devil's advocate on my idea",
    "Walk me through the pros and cons",
    "Help me prioritize my task list",
    "Analyze this situation from multiple angles",
    "Help me create a decision framework",
    "Challenge my assumptions about this approach",
    "Help me think about edge cases I might miss",
  ]
};

function renderWelcomeSuggestions(){
  const container=document.getElementById('welcomeSuggestions');
  if(!container)return;
  container.innerHTML='';
  // Pick 4 suggestions: 1 from each category, shuffled
  const categories=['general','coding','writing','thinking'];
  const picks=categories.map(cat=>{
    const pool=SUGGESTION_POOLS[cat];
    return pool[Math.floor(Math.random()*pool.length)];
  });
  // Shuffle
  for(let i=picks.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[picks[i],picks[j]]=[picks[j],picks[i]]}
  picks.forEach(text=>{
    const btn=document.createElement('button');
    btn.className='welcome-suggestion';
    btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg><span>'+text+'</span>';
    btn.onclick=()=>{
      document.getElementById('chatInput').value=text;
      handleSend();
    };
    container.appendChild(btn);
  });
}

function populateModels(){
  const list=document.getElementById('simpleModelList');list.innerHTML='';
  const groups=window.NotionAI.Core.Constants.MODEL_GROUPS;
  const current=window.NotionAI.API.Models.getCurrentModel();
  groups.forEach((group,gi)=>{
    const label=document.createElement('div');label.className='model-group-label';label.textContent=group.label;list.appendChild(label);
    group.models.forEach(model=>{
      const sel=model.id===current;
      const btn=document.createElement('button');btn.type='button';btn.className=`model-option${sel?' selected':''}`;
      const providerInitial=group.label.charAt(0);
      btn.innerHTML=`<div class="model-option-left"><span class="model-option-provider-badge">${providerInitial}</span><span class="model-option-name">${model.label}</span>${model.badge?`<span class="model-option-badge">${model.badge}</span>`:''}</div><svg class="model-option-check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;
      btn.onclick=e=>{e.stopPropagation();handleModelSelect(model.id,model.label,group.label)};
      list.appendChild(btn);
    });
    if(gi<groups.length-1){const d=document.createElement('div');d.className='model-group-divider';list.appendChild(d)}
  });
}

function handleModelSelect(modelId,label,provider){
  window.NotionAI.API.Models.setCurrentModel(modelId,label);
  document.getElementById('modelTriggerText').textContent=label;
  document.getElementById('modelTriggerProvider').textContent=provider;
  document.getElementById('customModelDropdown').classList.remove('open');
  populateModels();
}

function toggleModelDropdown(){document.getElementById('customModelDropdown').classList.toggle('open')}

function _updateSendButton(isGen){
  const btn=document.getElementById('sendBtn'),si=document.getElementById('sendIcon'),sti=document.getElementById('stopIcon');
  if(isGen){btn.classList.add('is-generating');si.classList.add('hidden');sti.classList.remove('hidden');btn.title='Stop generation'}
  else{btn.classList.remove('is-generating');si.classList.remove('hidden');sti.classList.add('hidden');btn.title='Send (Enter)'}
}

// Header title inline editing
function setupHeaderTitleEditing(){
  const ht=document.getElementById('headerTitle');
  ht.addEventListener('click',()=>{
    if(STATE.isGenerating||ht.classList.contains('hidden'))return;
    const chatId=STATE.currentChatId;const chats=STATE.chats;const chat=chats.find(c=>c.id===chatId);if(!chat)return;
    const input=document.createElement('input');input.type='text';input.className='header-title-input';input.value=chat.title;
    ht.replaceWith(input);input.focus();input.select();
    const save=()=>{const v=input.value.trim();if(v&&v!==chat.title)window.NotionAI.Chat.Manager.renameChat(chatId,v);
      input.replaceWith(ht);ht.textContent=v||chat.title;ht.classList.remove('hidden')};
    input.addEventListener('blur',save);
    input.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();save()}if(e.key==='Escape'){input.replaceWith(ht)}});
  });
}

// Sidebar resize
function setupSidebarResize(){
  const sidebar=document.getElementById('sidebar');
  const handle=document.getElementById('sidebarResizeHandle');
  if(!sidebar||!handle)return;
  let startX,startW;
  handle.addEventListener('mousedown',e=>{
    e.preventDefault();
    startX=e.clientX;startW=sidebar.offsetWidth;
    handle.classList.add('active');
    sidebar.style.transition='none';
    const onMove=ev=>{
      const w=Math.min(400,Math.max(160,startW+(ev.clientX-startX)));
      sidebar.style.width=w+'px';
    };
    const onUp=()=>{
      handle.classList.remove('active');
      sidebar.style.transition='';
      document.removeEventListener('mousemove',onMove);
      document.removeEventListener('mouseup',onUp);
    };
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });
}

async function handleSend(){
  if(STATE.isGenerating)return;
  const text=window.NotionAI.UI.Input.getValue();if(!text)return;
  let chat=STATE.chats.find(c=>c.id===STATE.currentChatId);
  if(!chat){chat={id:STATE.currentChatId,title:text.length>30?text.substring(0,30)+'...':text,messages:[],conversationId:null};STATE.chats.push(chat);document.getElementById('headerTitle').textContent=chat.title;document.getElementById('headerTitle').classList.remove('hidden')}
  window.NotionAI.UI.Input.clear();
  document.getElementById('welcomeScreen').classList.add('hidden');
  chat.messages.push({role:'user',content:text});
  window.NotionAI.Chat.Renderer.appendMessage('user',text,true);
  window.NotionAI.Chat.Storage.saveChats();
  window.NotionAI.Chat.Manager.renderChatList();
  window.NotionAI.Utils.DOM.scrollToBottom();
  showThinkingIndicator();
  const selectedModel=window.NotionAI.API.Models.getCurrentModel();
  const selectedModelDisplayName=window.NotionAI.API.Models.getCurrentModelLabel();
  STATE.isGenerating=true;window.NotionAI.UI.Input.disable();_updateSendButton(true);
  let aiWrapper=null,firstTokenReceived=false;
  const origConsume=window.NotionAI.Chat.Streaming.consumePayload.bind(window.NotionAI.Chat.Streaming);
  window.NotionAI.Chat.Streaming.consumePayload=function(payload,aw,ss,tt,far){
    if(!firstTokenReceived&&payload&&payload!=='[DONE]'){try{const o=JSON.parse(payload);if(o?.choices?.[0]?.delta?.content||o?.choices?.[0]?.delta?.reasoning_content||o?.type==='thinking_chunk'){firstTokenReceived=true;removeThinkingIndicator()}}catch(e){}}
    return origConsume(payload,aw,ss,tt,far);
  };
  try{
    aiWrapper=window.NotionAI.Chat.Renderer.appendMessage('assistant','',false,selectedModelDisplayName);
    aiWrapper._thinkingStartTime=Date.now();
    const timerEl=aiWrapper.thinkingCardRef?.querySelector('.thinking-header-timer');
    if(timerEl)aiWrapper._thinkingTimerInterval=setInterval(()=>{if(aiWrapper._thinkingStartTime)timerEl.textContent=Math.round((Date.now()-aiWrapper._thinkingStartTime)/1000)+'s'},1000);
    window.NotionAI.Utils.DOM.scrollToBottom();
    const result=await window.NotionAI.Chat.Streaming.streamResponse(chat,selectedModel,aiWrapper);
    removeThinkingIndicator();
    if(aiWrapper._thinkingTimerInterval){clearInterval(aiWrapper._thinkingTimerInterval);aiWrapper._thinkingTimerInterval=null}
    const ns=window.NotionAI.Utils.Validation.normalizeSearchPayload(result.searchState);
    if(result.fullAiReply.trim()){
      window.NotionAI.Chat.Renderer.updateAIMessage(aiWrapper,result.fullAiReply,true);
      chat.messages.push({role:'assistant',content:result.fullAiReply,thinking:result.thinkingText,search:ns,modelDisplayName:selectedModelDisplayName});
      window.NotionAI.Chat.Storage.saveChats();
    }else{window.NotionAI.Chat.Renderer.updateAIMessage(aiWrapper,'*No visible response received.*',true)}
  }catch(err){removeThinkingIndicator();if(aiWrapper?._thinkingTimerInterval)clearInterval(aiWrapper._thinkingTimerInterval);if(err.name!=='AbortError')console.error('API Error:',err)}
  finally{window.NotionAI.Chat.Streaming.consumePayload=origConsume;STATE.isGenerating=false;window.NotionAI.UI.Input.enable();window.NotionAI.UI.Input.focus();STATE.controller=null;_updateSendButton(false)}
}

function init(){
  window.NotionAI.Chat.Storage.loadChats();
  window.NotionAI.Chat.Storage.saveChats();
  window.NotionAI.UI.Theme.init();
  window.NotionAI.API.Models.loadModels();
  window.NotionAI.Chat.Manager.renderChatList();
  updateWelcomeGreeting();
  renderWelcomeSuggestions();
  populateModels();
  setupHeaderTitleEditing();
  setupSidebarResize();

  // Event listeners
  document.getElementById('themeToggleBtn').addEventListener('click',()=>window.NotionAI.UI.Theme.toggle());
  document.getElementById('newChatBtn').addEventListener('click',()=>window.NotionAI.Chat.Manager.startNewChat());
  document.getElementById('openSidebarBtn').addEventListener('click',()=>window.NotionAI.UI.Sidebar.open());
  document.getElementById('mobileBackdrop').addEventListener('click',()=>window.NotionAI.UI.Sidebar.close());
  document.getElementById('chatInput').addEventListener('input',()=>window.NotionAI.UI.Input.autoResize());
  document.getElementById('chatInput').addEventListener('keydown',e=>window.NotionAI.UI.Input.handleKeydown(e,handleSend));
  document.getElementById('sendBtn').addEventListener('click',()=>{if(STATE.isGenerating){if(STATE.controller)STATE.controller.abort()}else handleSend()});
  document.getElementById('memoryBannerClose').addEventListener('click',()=>document.getElementById('memoryBanner').classList.add('hidden'));
  document.getElementById('settingsBtn').addEventListener('click',()=>window.NotionAI.API.Settings.open());
  document.getElementById('cancelSettingsBtn').addEventListener('click',()=>window.NotionAI.API.Settings.close());
  document.getElementById('saveSettingsBtn').addEventListener('click',()=>window.NotionAI.API.Settings.save());
  document.getElementById('cancelRenameBtn').addEventListener('click',()=>window.NotionAI.UI.Modal.closeRenameModal());
  document.getElementById('saveRenameBtn').addEventListener('click',()=>window.NotionAI.UI.Modal.saveRename());
  document.getElementById('renameModalInput').addEventListener('keydown',e=>{if(e.key==='Enter')window.NotionAI.UI.Modal.saveRename();if(e.key==='Escape')window.NotionAI.UI.Modal.closeRenameModal()});
  document.getElementById('modelTriggerBtn').addEventListener('click',e=>{e.stopPropagation();toggleModelDropdown()});
  document.addEventListener('click',e=>{const dd=document.getElementById('customModelDropdown');if(!dd.contains(e.target)&&e.target.id!=='modelTriggerBtn')dd.classList.remove('open')});
  document.getElementById('searchInput').addEventListener('input',()=>window.NotionAI.Chat.Manager.renderChatList());

  if(!STATE.currentChatId)window.NotionAI.Chat.Manager.startNewChat();
}

setInterval(updateWelcomeGreeting,60000);
window.addEventListener('DOMContentLoaded',init);
</script>
